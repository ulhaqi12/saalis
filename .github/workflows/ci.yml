name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lib:
    name: saalis (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest --tb=short --cov=src/saalis --cov-fail-under=80

  sidecar:
    name: saalis-sidecar (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install all workspace packages
        run: uv sync --all-packages --extra dev

      - name: Lint sidecar
        run: uv run ruff check sidecar/src sidecar/tests

      - name: Type check sidecar
        run: uv run --package saalis-sidecar mypy

      - name: Test sidecar
        run: uv run --package saalis-sidecar pytest sidecar/tests/ --tb=short
